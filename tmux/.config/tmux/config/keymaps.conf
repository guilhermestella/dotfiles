# ════════════════════════════════════════════════════════════════════════════
# General
# ════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Reload config alias
set -s command-alias[100] reload="source-file ~/.config/tmux/tmux.conf \; display 'Config Reloaded!'"

# Clear terminal
unbind l
bind l send-keys C-l

# Vim-like copy/paste
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ════════════════════════════════════════════════════════════════════════════
# Windows / Panes
# ════════════════════════════════════════════════════════════════════════════

# New pane/window
unbind c
bind n command-prompt -p "window name:" "new-window -c '#{pane_current_path}'; rename-window '%%'"
bind '"' split-window -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Window rotation
bind r rotate-window
bind R rotate-window -D

# Pane navigation with Neovim
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)
set -g @smart-splits_move_left_key  'C-h'
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'

# Resize with vim detection
set -g @smart-splits_resize_left_key  'M-Left'
set -g @smart-splits_resize_down_key  'M-Down'
set -g @smart-splits_resize_up_key    'M-Up'
set -g @smart-splits_resize_right_key 'M-Right'

# ════════════════════════════════════════════════════════════════════════════
# Popups
# ════════════════════════════════════════════════════════════════════════════
unbind t
bind t display-popup -w 90% -h 60% -E
bind g display-popup -w 95% -h 95% -E 'lazygit'

