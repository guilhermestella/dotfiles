# ════════════════════════════════════════════════════════════════════════════
# General
# ════════════════════════════════════════════════════════════════════════════

# Prefix
unbind C-b
set -g prefix C-a

# Reload config alias
set -s command-alias[100] reload="source-file ~/.config/tmux/tmux.conf \; display 'Config Reloaded!'"

# Clear terminal
unbind l
bind l send-keys C-l

# Vim-like copy/paste
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ════════════════════════════════════════════════════════════════════════════
# Windows / Panes
# ════════════════════════════════════════════════════════════════════════════

# New pane/window
unbind c
bind n command-prompt -p "window name:" "new-window -c '#{pane_current_path}'; rename-window '%%'"
bind '"' split-window -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Window rotation
bind r rotate-window
bind R rotate-window -D

# Resize with vim detection
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'"
bind -n M-Left if-shell "$is_vim" "send-keys M-Left" "resize-pane -L 5"
bind -n M-Right if-shell "$is_vim" "send-keys M-Right" "resize-pane -R 5"
bind -n M-Up if-shell "$is_vim" "send-keys M-Up" "resize-pane -U 3"
bind -n M-Down if-shell "$is_vim" "send-keys M-Down" "resize-pane -D 3"

# ════════════════════════════════════════════════════════════════════════════
# Popups
# ════════════════════════════════════════════════════════════════════════════
unbind t
bind t display-popup -w 90% -h 60% -E
bind g display-popup -w 95% -h 95% -E 'lazygit'

