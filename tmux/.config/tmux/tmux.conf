########## Plugin manager location ##########
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

########## Plugins ##########
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'

# Restore session
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

########## Key Mappings ##########
# Source Config File
unbind R
bind R source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Define prefix
unbind C-b
set -g prefix C-a

# Clear terminal
unbind l
bind l send-keys C-l

# New pane or window
unbind c
bind c command-prompt -p "window name:" "new-window -c '#{pane_current_path}'; rename-window '%%'"
bind '"' split-window -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Windows navigation
bind j previous-window
bind k next-window

# Resize
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'"
bind -n M-Left if-shell "$is_vim" "send-keys M-Left" "resize-pane -L 5"
bind -n M-Right if-shell "$is_vim" "send-keys M-Right" "resize-pane -R 5"
bind -n M-Up if-shell "$is_vim" "send-keys M-Up" "resize-pane -U 3"
bind -n M-Down if-shell "$is_vim" "send-keys M-Down" "resize-pane -D 3"

# Vim-like copy/paste
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Pop up binds
unbind t
bind t display-popup -w 90% -h 60% -E
bind g display-popup -w 95% -h 95% -E 'lazygit'

########## Configurations ##########
# Configure Tmux
set -g mouse on
set -g mode-keys vi
set -g set-clipboard on
set -g history-limit 1000000
set -g status-position bottom
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",*:RGB"
set -g focus-events on

# Configure Window
set -g base-index 1
set -g renumber-windows on

# Configure Pane
set -g pane-base-index 1

#Theme
set -g @tmux-gruvbox 'dark256'
set -g @tmux-gruvbox-right-status-x ' '
set -g @tmux-gruvbox-right-status-y ' '

run '~/.config/tmux/plugins/tpm/tpm'
