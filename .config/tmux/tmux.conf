########## Plugin manager location ##########
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

########## Plugins ##########
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# Restore session
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

########## Key Mappings ##########
# Source Config File
unbind R
bind R source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# Define prefix
set -g prefix C-s
unbind C-b

# Clear terminal
unbind l
bind l send-keys C-l

# New pane or window
bind c   new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Resize
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "resize-pane -L 5"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "resize-pane -R 5"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "resize-pane -U 3"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "resize-pane -D 3"

# Vim-like copy/paste
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Pop up binds
unbind t
bind t display-popup -w 90% -h 60% -E
bind g display-popup -w 95% -h 95% -E 'lazygit'

########## Configurations ##########
#Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Configure Tmux
set -g mouse on
set -g mode-keys vi
set -g set-clipboard on
set -g history-limit 1000000
set -g status-position top
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",*:RGB"
set -g focus-events on

# Configure Window
set -g base-index 1
set -g renumber-windows on

# Configure Pane
set -g pane-base-index 1

run '~/.config/tmux/plugins/tpm/tpm'
